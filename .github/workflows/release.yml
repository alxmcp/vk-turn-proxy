name: Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            cgo: 0
          - goos: linux
            goarch: arm64
            cgo: 0
          - goos: linux
            goarch: 386
            cgo: 0
          - goos: linux
            goarch: arm
            goarm: "7"
            cgo: 0
          - goos: darwin
            goarch: amd64
            cgo: 0
          - goos: darwin
            goarch: arm64
            cgo: 0
          - goos: windows
            goarch: amd64
            cgo: 0
          - goos: windows
            goarch: 386
            cgo: 0
          - goos: android
            goarch: arm64
            cgo: 1
            api: 21
          - goos: android
            goarch: arm
            cgo: 1
            api: 21
          - goos: freebsd
            goarch: amd64
            cgo: 0

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.5"

      # Install Android NDK only for android rows
      - name: Setup Android NDK
        if: matrix.goos == 'android'
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: false

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: ${{ matrix.cgo }}
          ANDROID_API: ${{ matrix.api }}
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          VERSION: ${{ github.ref_name }}
        run: |
          echo "Building for $GOOS/$GOARCH${GOARM:+/arm$GOARM} (CGO_ENABLED=$CGO_ENABLED)"

          if [ "$GOOS" = "android" ]; then
            if [ -z "$ANDROID_NDK_HOME" ]; then
              echo "ANDROID_NDK_HOME is not set – did setup-ndk run?"
              exit 1
            fi

            TOOLCHAIN_BIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"

            if [ "$GOARCH" = "arm64" ]; then
              export CC="$TOOLCHAIN_BIN/aarch64-linux-android${ANDROID_API}-clang"
            elif [ "$GOARCH" = "arm" ]; then
              export CC="$TOOLCHAIN_BIN/armv7a-linux-androideabi${ANDROID_API}-clang"
            else
              echo "Unsupported ANDROID GOARCH=$GOARCH"
              exit 1
            fi

            echo "Using Android NDK CC=$CC"
          fi

          mkdir -p dist

          # Set extension for windows
          if [ "${GOOS}" = "windows" ]; then
            EXT=.exe
          else
            EXT=
          fi

          GOOS=$GOOS GOARCH=$GOARCH GOARM=$GOARM \
          go build -ldflags "-s -w -checklinkname=0" -trimpath \
            -o "dist/client-${GOOS}-${GOARCH}${EXT}" \
            ./client

          GOOS=$GOOS GOARCH=$GOARCH GOARM=$GOARM \
          go build -ldflags "-s -w -checklinkname=0" -trimpath \
            -o "dist/server-${GOOS}-${GOARCH}${EXT}" \
            ./server

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: good-turn-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/**

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist

      - name: Prepare release metadata
        id: meta
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          SHORT_SHA="${COMMIT_SHA::7}"
          TAG_NAME="auto-${BRANCH_NAME}-${SHORT_SHA}"

          {
            echo "tag_name=$TAG_NAME"
            echo "release_name=$TAG_NAME"
            echo "body_path=release-notes.md"
          } >> "$GITHUB_OUTPUT"

      - name: Generate release notes from commit messages
        id: notes
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          {
            echo "body_path=release-notes.md"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Changes"
            echo
            echo "Branch: \`$BRANCH_NAME\`"
            echo "Commit: \`${COMMIT_SHA}\`"
            echo

            if [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
              echo "Changes since \`${BEFORE_SHA::7}\`:"
              echo
              git log --no-merges --format='- %s (%h)' "$BEFORE_SHA..$COMMIT_SHA"
            else
              echo "Changes in this commit:"
              echo
              git log --no-merges --format='- %s (%h)' -n 1 "$COMMIT_SHA"
            fi
          } > release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # upload every file in dist/ including nested files
          files: |
            dist/**
          tag_name: ${{ steps.meta.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.release_name }}
          body_path: ${{ steps.meta.outputs.body_path }}
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
